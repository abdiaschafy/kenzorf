server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # SPA Angular : tout chemin inconnu retombe sur index.html (routing client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API .NET (le SPA appelle /api en relatif → proxy vers le service "api")
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Images produit servies par l'API (wwwroot/uploads)
    location /uploads/ {
        proxy_pass http://api:8080/uploads/;
    }

    # Cache long pour les assets fingerprintés
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
