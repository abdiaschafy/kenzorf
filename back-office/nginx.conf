server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- En-têtes de sécurité (défense en profondeur, audit) ----------------
    # Anti-clickjacking : interdit l'embarquement du back-office dans une iframe.
    add_header X-Frame-Options "DENY" always;
    # Empêche le MIME-sniffing (réduit les attaques par confusion de type).
    add_header X-Content-Type-Options "nosniff" always;
    # Ne fuite pas l'URL référente vers des tiers.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP : le SPA Angular (esbuild) charge ses bundles JS/CSS en same-origin et
    # appelle l'API/uploads en same-origin (proxiés ci-dessous). Angular injecte
    # des styles inline pour les styles de composants → 'unsafe-inline' requis sur
    # style-src. 'unsafe-inline' n'est PAS autorisé sur script-src (pas d'inline
    # script généré). frame-ancestors 'none' double X-Frame-Options pour les
    # navigateurs récents.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # SPA Angular : tout chemin inconnu retombe sur index.html (routing client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API .NET (le SPA appelle /api en relatif → proxy vers le service "api")
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Images produit servies par l'API (wwwroot/uploads)
    location /uploads/ {
        proxy_pass http://api:8080/uploads/;
    }

    # Cache long pour les assets fingerprintés.
    # nginx n'hérite pas des add_header du bloc serveur dès qu'un location en
    # déclare un : on réémet donc explicitement les en-têtes de sécurité ici.
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        try_files $uri =404;
    }
}
